$kind: http-example
request:
  url: "{{baseUrl}}/user/:username"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: username
      value: string
      description: "The name that needs to be fetched. Use user1 for testing. "
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 806,
        "username": "string",
        "firstName": "string",
        "lastName": "string",
        "email": "string",
        "password": "string",
        "phone": "string",
        "userStatus": 6125
      }
order: 1000
