$kind: http-request
url: "{{baseUrl}}/user/login?username=string&password=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: username
    value: string
    description: The user name for login
  - key: password
    value: string
    description: The password for login in clear text
examples: ./.resources/Logs user into the system.resources/examples
order: 1000
