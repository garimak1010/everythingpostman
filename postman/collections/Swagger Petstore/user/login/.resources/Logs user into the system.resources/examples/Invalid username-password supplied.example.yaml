$kind: http-example
name: Invalid username/password supplied
request:
  url: "{{baseUrl}}/user/login?username=string&password=string"
  method: GET
  queryParams:
    - key: username
      value: string
      description: The user name for login
    - key: password
      value: string
      description: The password for login in clear text
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: ""
order: 2000
