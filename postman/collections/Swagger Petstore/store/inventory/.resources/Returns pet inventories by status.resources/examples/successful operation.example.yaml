$kind: http-example
request:
  url: "{{baseUrl}}/store/inventory"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: api_key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "key_0": 8975
      }
order: 1000
