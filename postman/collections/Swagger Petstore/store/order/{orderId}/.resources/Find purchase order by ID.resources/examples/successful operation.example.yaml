$kind: http-example
request:
  url: "{{baseUrl}}/store/order/:orderId"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: orderId
      value: "4"
      description: ID of pet that needs to be fetched
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 8546,
        "petId": 278,
        "quantity": 8120,
        "shipDate": "1986-04-24T18:36:16.503Z",
        "status": "placed",
        "complete": false
      }
order: 1000
