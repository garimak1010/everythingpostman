$kind: http-example
request:
  url: "{{baseUrl}}/pet/:petId"
  method: DELETE
  headers:
    - key: api_key
      value: string
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  pathVariables:
    - key: petId
      value: "3678"
      description: Pet id to delete
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: ""
order: 1000
