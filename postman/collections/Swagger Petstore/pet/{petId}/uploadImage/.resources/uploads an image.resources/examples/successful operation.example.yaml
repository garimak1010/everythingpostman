$kind: http-example
request:
  url: "{{baseUrl}}/pet/:petId/uploadImage"
  method: POST
  headers:
    - key: Content-Type
      value: multipart/form-data
    - key: Accept
      value: application/json
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  pathVariables:
    - key: petId
      value: "3678"
      description: ID of pet to update
  body:
    type: formdata
    content:
      - type: text
        key: additionalMetadata
        value: string
        description: Additional data to pass to server
      - type: file
        key: file
        src: []
        description: file to upload
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": 5682,
        "type": "string",
        "message": "string"
      }
order: 1000
